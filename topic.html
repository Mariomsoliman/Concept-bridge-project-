<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Topic • Concept Bridge</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page page--lesson page--topic">
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="logo">Concept Bridge</h1>
        <nav class="top-nav" aria-label="Main site navigation">
          <a href="index.html" class="top-nav__link">Home</a>
          <a href="ns.html" class="top-nav__link">Natural Science</a>
          <a href="cs.html" class="top-nav__link">Computer Science</a>
          <a href="roadmap.html" class="top-nav__link">Roadmap Explorer</a>
        </nav>
      </div>
    </header>

    <main id="topic-root">
      <nav class="lesson__breadcrumbs" aria-label="Breadcrumb">
        <a href="index.html">Home</a>
        <span>&rsaquo;</span>
        <span id="topic-field-label">Topic</span>
        <span>&rsaquo;</span>
        <span id="topic-title-breadcrumb">Loading…</span>
      </nav>

      <header class="lesson__header">
        <p class="eyebrow" id="topic-field"></p>
        <h2 class="lesson__title" id="topic-title">Loading topic…</h2>
        <p class="lesson__summary" id="topic-summary"></p>
      </header>

      <section class="lesson__media" id="topic-media" aria-label="Topic media">
        <!-- Filled dynamically with a video embed or a placeholder -->
      </section>

      <section class="lesson__content" id="topic-sections" aria-label="Topic sections">
        <!-- Filled dynamically with topic sections -->
      </section>

      <section class="lesson__quiz" id="topic-quiz" aria-label="Topic quiz" hidden>
        <!-- Filled dynamically with quiz UI if quiz data is present -->
      </section>

      <section class="lesson__related" id="topic-related" aria-label="Related topics" hidden>
        <!-- Filled dynamically with related topic links -->
      </section>

      <p id="topic-status" class="muted"></p>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 Concept Bridge &mdash; Dynamic topic page</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
